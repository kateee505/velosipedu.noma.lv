<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Velosipēdu noma</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>🚴 Velosipēdu noma</h1>
    <p>Izvēlies velosipēdu un dienu skaitu</p>

    <label>Velosipēda veids:</label>
    <select id="bike">
        <option value="10">Pilsētas velo – 10€ / dienā</option>
        <option value="15">Kalnu velo – 15€ / dienā</option>
        <option value="20">Elektriskais velo – 20€ / dienā</option>
    </select>

    <label>Dienu skaits:</label>
    <input type="number" id="days" min="1" placeholder="Ievadi dienas">

    <button id="btn">Aprēķināt</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
